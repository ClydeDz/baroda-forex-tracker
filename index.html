<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INR Exchange Rate Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 40px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f5f5f5;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        .date-cell {
            font-weight: 500;
            color: #333;
        }

        .value-cell {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>INR Exchange Rate Tracker</h1>
        <p class="subtitle">Selling rate from Baroda Bank NZ</p>

        <div id="error-container"></div>
        <div id="loading" class="loading">Loading data...</div>

        <div id="content" style="display: none;">
            <div class="stats" id="stats-container"></div>

            <div class="chart-container">
                <canvas id="rateChart"></canvas>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Selling Rate (INR)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let chart = null;

        async function loadAndDisplayData() {
            try {
                const response = await fetch('inr-rates.json');
                if (!response.ok) {
                    throw new Error('Failed to load data');
                }
                const rawData = await response.json();

                // Filter to one entry per date (keep first occurrence)
                const seenDates = new Set();
                const filteredData = rawData.filter(entry => {
                    if (seenDates.has(entry.date)) {
                        return false;
                    }
                    seenDates.add(entry.date);
                    return true;
                });

                // Sort by date (oldest first)
                filteredData.sort((a, b) => {
                    const dateA = new Date(a.date.split('-').reverse().join('-'));
                    const dateB = new Date(b.date.split('-').reverse().join('-'));
                    return dateA - dateB;
                });

                displayStats(filteredData);
                displayChart(filteredData);
                displayTable(filteredData);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-container').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Could not load data. Make sure inr-rates.json is in the same directory.
                    </div>
                `;
            }
        }

        function displayStats(data) {
            if (data.length === 0) return;

            const values = data.map(d => d.value);
            const currentValue = values[values.length - 1];
            const minValue = Math.min(...values);
            const maxValue = Math.max(...values);

            const statsHtml = `
                <div class="stat-card">
                    <div class="stat-label">Current Rate</div>
                    <div class="stat-value">${currentValue.toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Highest Rate</div>
                    <div class="stat-value">${maxValue.toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Lowest Rate</div>
                    <div class="stat-value">${minValue.toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Data Points</div>
                    <div class="stat-value">${data.length}</div>
                </div>
            `;

            document.getElementById('stats-container').innerHTML = statsHtml;
        }

        function displayChart(data) {
            const ctx = document.getElementById('rateChart').getContext('2d');

            // Destroy existing chart if it exists
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'INR Selling Rate',
                        data: data.map(d => d.value),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                font: {
                                    size: 12,
                                    weight: 'bold'
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: 'Rate (INR)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        }
                    }
                }
            });
        }

        function displayTable(data) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = data.map(entry => `
                <tr>
                    <td class="date-cell">${entry.date}</td>
                    <td class="value-cell">${entry.value.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', loadAndDisplayData);
    </script>
</body>
</html>
